services:
  wgetbash:
    build:
      context: ..
      dockerfile: go/Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ../go:/app               # Go source + static files (hot-reloaded by Air)
      - ./data:/data
      - go-mod-cache:/go/pkg/mod # Persist module cache across restarts
    env_file:
      - .env

volumes:
  go-mod-cache:
